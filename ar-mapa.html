<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AR Mapa · Praça Fausto Cardoso</title>

  <!-- ═══════════════════════════════════════════════
       CONFIGURAÇÃO
       ═══════════════════════════════════════════════ -->
  <script>
    var GOOGLE_MAPS_API_KEY = 'AIzaSyAhFPY23nrQ2hSlCnzZq-jrHNPky903EcM';
    var MONUMENT_LAT        = -10.9172482;
    var MONUMENT_LNG        = -37.0471308;
    var SIM_DISTANCE        = 50;  /* metros para o botão de simulação */
  </script>

  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none; user-select: none;
    }

    :root {
      --accent:      #FF6600;
      --accent-glow: rgba(255,102,0,0.5);
      --glass:       rgba(8,8,20,0.65);
      --glass-b:     rgba(255,255,255,0.12);
      --blue:        #4285F4;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    /* ── A-Frame: tela cheia ──────────────────────── */
    a-scene {
      position: fixed !important;
      inset: 0 !important;
      width: 100% !important;
      height: 100% !important;
      z-index: 0 !important;
    }

    /* ════════════════════════════════════════════════
       TELA INICIAL
       ════════════════════════════════════════════════ */
    #start-screen {
      position: fixed; inset: 0; z-index: 9000;
      background: radial-gradient(ellipse at 55% 35%, #1b0f40 0%, #0c0c1c 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; padding: 36px 28px; text-align: center;
    }
    .ss-icon   { font-size: 3.5rem; line-height: 1; }
    .ss-title  {
      font-size: clamp(1.3rem, 5vw, 1.8rem); font-weight: 800;
      background: linear-gradient(130deg, var(--accent), #ffb347);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .ss-body   { font-size: 0.88rem; color: rgba(255,255,255,0.6); max-width: 300px; line-height: 1.65; }
    .ss-hint   { font-size: 0.74rem; color: rgba(255,255,255,0.32); max-width: 280px; line-height: 1.55; }
    #start-btn {
      background: linear-gradient(130deg, var(--accent), #ff9020);
      color: #fff; border: none; border-radius: 999px;
      padding: 17px 52px; font-size: 1.05rem; font-weight: 800;
      cursor: pointer; box-shadow: 0 6px 28px var(--accent-glow);
      -webkit-appearance: none; transition: transform 0.12s, box-shadow 0.12s;
    }
    #start-btn:active { transform: scale(0.95); box-shadow: 0 3px 14px var(--accent-glow); }

    /* ════════════════════════════════════════════════
       HUD PRINCIPAL
       ════════════════════════════════════════════════ */
    #hud {
      display: none; position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
    }

    /* ── Status bar ─────────────────────────────── */
    #status-bar {
      position: absolute;
      top: max(env(safe-area-inset-top), 14px);
      left: 50%; transform: translateX(-50%);
      background: var(--glass);
      backdrop-filter: blur(16px) saturate(160%);
      -webkit-backdrop-filter: blur(16px) saturate(160%);
      border: 1px solid var(--glass-b);
      border-radius: 999px; padding: 9px 20px;
      font-size: 0.78rem; font-weight: 600; white-space: nowrap;
      display: flex; align-items: center; gap: 9px;
      max-width: calc(100vw - 32px);
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #444;
      flex-shrink: 0; transition: background 0.4s, box-shadow 0.4s;
    }
    #status-dot.active { background: #4caf50; box-shadow: 0 0 8px rgba(76,175,80,0.7); }
    #status-dot.warn   { background: #ffc800; box-shadow: 0 0 8px rgba(255,200,0,0.7); }
    #status-dot.error  { background: #f44336; box-shadow: 0 0 8px rgba(244,67,54,0.7); }

    /* ── Seta direcional (centro) ───────────────── */
    #arrow-hub {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    #arrow-ring {
      width: 78px; height: 78px; border-radius: 50%;
      background: var(--glass);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 2px solid var(--glass-b);
      box-shadow: 0 0 22px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,0.07);
      display: flex; align-items: center; justify-content: center;
      will-change: transform;
      transition: transform 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    #arrow-svg {
      width: 36px; height: 36px;
      fill: var(--accent);
      filter: drop-shadow(0 0 9px var(--accent-glow));
    }
    #arrow-label {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.09em;
      text-transform: uppercase; color: rgba(255,255,255,0.72);
      background: var(--glass);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-b); border-radius: 999px; padding: 4px 14px;
    }

    /* ── Medidor de distância ───────────────────── */
    #dist-meter {
      position: absolute;
      /* Fica acima do mini-mapa: mapa 150px + margem 26px + ~30px para o medidor */
      bottom: calc(max(env(safe-area-inset-bottom), 0px) + 216px);
      left: auto; right: 26px;
      display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
    }
    #dist-number {
      font-size: 2.2rem; font-weight: 800;
      color: var(--accent); text-shadow: 0 0 18px var(--accent-glow);
      line-height: 1; transition: color 0.5s, text-shadow 0.5s;
    }
    #dist-number.near { color: #4caf50; text-shadow: 0 0 18px rgba(76,175,80,0.6); }
    #dist-unit {
      font-size: 0.68rem; font-weight: 600;
      color: rgba(255,255,255,0.45); letter-spacing: 0.1em; text-transform: uppercase;
    }

    /* ── Botão Simular ──────────────────────────── */
    #sim-btn {
      position: absolute;
      bottom: calc(max(env(safe-area-inset-bottom), 0px) + 26px);
      left: 26px;
      pointer-events: all;
      background: var(--glass);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--glass-b);
      color: rgba(255,255,255,0.85);
      border-radius: 14px; padding: 11px 18px;
      font-size: 0.8rem; font-weight: 700;
      cursor: pointer; -webkit-appearance: none;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    #sim-btn.simulating {
      background: rgba(255,200,0,0.18);
      border-color: rgba(255,200,0,0.5);
      color: #ffd000;
    }
    #sim-btn:active { opacity: 0.75; }

    /* ════════════════════════════════════════════════
       MINI-MAPA CIRCULAR
       ════════════════════════════════════════════════ */
    #minimap-wrapper {
      /* Posição: canto inferior direito */
      position: absolute;
      bottom: calc(max(env(safe-area-inset-bottom), 0px) + 26px);
      right: 26px;

      width: 150px; height: 150px;
      border-radius: 50%;
      overflow: hidden;

      /* Decoração */
      border: 2.5px solid rgba(255,255,255,0.3);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5),
        0 8px 32px rgba(0,0,0,0.75),
        0 0 0 4px rgba(255,102,0,0.12);
    }

    /* Div que ROTACIONA o canvas do Google Maps.
       200×200 centralizado num wrapper de 150×150
       → 25 px de margem em cada lado como buffer de rotação. */
    #minimap-rotator {
      position: absolute;
      top: -25px; left: -25px;
      width: 200px; height: 200px;
      will-change: transform;
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    #google-map-canvas { width: 200px; height: 200px; }

    /* Overlay fixo sobre o mapa (não rotaciona) */
    #minimap-overlay {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }

    /* Ponto azul do usuário — sempre no centro */
    #user-dot {
      position: relative;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--blue);
      border: 2.5px solid #fff;
      box-shadow: 0 0 12px rgba(66,133,244,0.9), 0 0 0 5px rgba(66,133,244,0.18);
    }
    /* Triângulo acima do ponto → indica "frente" do usuário.
       Como o mapa rotaciona (heading-up), a frente é sempre o topo. */
    #user-dot::before {
      content: '';
      position: absolute;
      top: -11px; left: 50%; transform: translateX(-50%);
      border-left:   5px solid transparent;
      border-right:  5px solid transparent;
      border-bottom: 9px solid var(--blue);
      filter: drop-shadow(0 -1px 3px rgba(66,133,244,0.8));
    }

    /* Anel de precisão pulsante */
    #user-dot::after {
      content: '';
      position: absolute;
      inset: -6px; border-radius: 50%;
      border: 1.5px solid rgba(66,133,244,0.4);
      animation: pulseRing 2s ease-out infinite;
    }
    @keyframes pulseRing {
      0%   { transform: scale(0.8); opacity: 0.6; }
      100% { transform: scale(2.0); opacity: 0;   }
    }

    /* Label "SIM" quando simulação ativa */
    #minimap-sim-badge {
      display: none;
      position: absolute; bottom: 8px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem; font-weight: 800; letter-spacing: 0.08em;
      color: #ffd000; text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      z-index: 11; pointer-events: none; white-space: nowrap;
    }

    /* Indicador de Norte — fixo no topo do círculo */
    #minimap-north-label {
      position: absolute; top: 7px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.58rem; font-weight: 800; letter-spacing: 0.06em;
      color: rgba(255,255,255,0.75);
      text-shadow: 0 1px 4px rgba(0,0,0,0.9);
      z-index: 11; pointer-events: none;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     TELA INICIAL
     ═══════════════════════════════════════════ -->
<div id="start-screen">
  <div class="ss-icon">🗺️</div>
  <h1 class="ss-title">AR + Mini Mapa</h1>
  <p class="ss-body">
    Câmera AR com seta de navegação e mini mapa rotativo
    para a <strong>Praça Fausto Cardoso</strong> em Aracaju.
  </p>
  <p class="ss-hint" id="ss-hint">
    Permita o acesso à câmera, localização GPS
    e sensores de movimento quando solicitado.
  </p>
  <button id="start-btn">▶ Iniciar</button>
</div>


<!-- ═══════════════════════════════════════════
     CENA A-FRAME / AR.js
     ═══════════════════════════════════════════ -->
<a-scene
  vr-mode-ui="enabled: false"
  embedded
  arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
  renderer="antialias: true; alpha: true; logarithmicDepthBuffer: true;"
  loading-screen="enabled: false"
>
  <!-- gps-camera adicionado dinamicamente após permissão ser concedida -->
  <a-camera id="ar-camera"></a-camera>

  <!-- ▸ Marcador 3D do monumento -->
  <a-entity
    id="monument-entity"
    gps-entity-place="latitude: -10.9172482; longitude: -37.0471308"
    visible="false"
  >
    <!-- Coluna principal girando -->
    <a-cylinder
      height="8" radius="1.2"
      color="#FF6600" opacity="0.6" transparent="true" side="double"
      position="0 4 0"
      animation="property: rotation; to: 0 360 0; dur: 8000; easing: linear; loop: true"
    ></a-cylinder>

    <!-- Cone/seta no topo pulsante -->
    <a-cone
      height="4" radius-bottom="1.8" radius-top="0"
      color="#FF6600" opacity="0.75" transparent="true" side="double"
      position="0 10 0"
      animation="property: scale; from: 0.85 0.85 0.85; to: 1.15 1.15 1.15; dur: 1000; loop: true; dir: alternate; easing: easeInOutSine"
    ></a-cone>

    <!-- Halo base -->
    <a-torus
      radius="1.8" radius-tubular="0.1"
      color="#ffaa33" opacity="0.4" transparent="true"
      position="0 0.1 0"
      animation="property: material.opacity; from: 0.1; to: 0.6; dur: 1300; loop: true; dir: alternate; easing: easeInOutSine"
    ></a-torus>
  </a-entity>
</a-scene>


<!-- ═══════════════════════════════════════════
     HUD
     ═══════════════════════════════════════════ -->
<div id="hud">

  <!-- Barra de status -->
  <div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">Aguardando GPS…</span>
  </div>

  <!-- Seta direcional (centro da tela) -->
  <div id="arrow-hub">
    <div id="arrow-ring">
      <!-- SVG aponta para cima (Norte/frente) = 0°; JS rotaciona conforme bearing -->
      <svg id="arrow-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2 L19.5 21 L12 16.5 L4.5 21 Z"/>
      </svg>
    </div>
    <div id="arrow-label">Para o monumento</div>
  </div>

  <!-- Distância (acima do mini-mapa) -->
  <div id="dist-meter">
    <div id="dist-number">--</div>
    <div id="dist-unit">metros</div>
  </div>

  <!-- Botão de simulação -->
  <button id="sim-btn" onclick="toggleSimulate()">🎮 Simular 50m</button>

  <!-- ── Mini-mapa circular ───────────────────────── -->
  <div id="minimap-wrapper">
    <!-- Este div rotaciona o mapa conforme o heading do usuário -->
    <div id="minimap-rotator">
      <div id="google-map-canvas"></div>
    </div>
    <!-- Overlay fixo: não rotaciona com o mapa -->
    <div id="minimap-overlay">
      <div id="user-dot"></div>
    </div>
    <div id="minimap-north-label">▲ frente</div>
    <div id="minimap-sim-badge">● SIM</div>
  </div>

</div><!-- /#hud -->


<!-- ═══════════════════════════════════════════
     SCRIPTS EXTERNOS
     ═══════════════════════════════════════════ -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-location-only.js"></script>

<!-- Google Maps: callback declarado antes de carregar o script -->
<script>
  window._googleMapsReady = false;
  window._pendingCalc     = null;

  window.onGoogleMapsReady = function () {
    window._googleMapsReady = true;
    initMiniMap();
    if (typeof window._pendingCalc === 'function') {
      window._pendingCalc();
      window._pendingCalc = null;
    }
  };
</script>
<script
  async defer
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAhFPY23nrQ2hSlCnzZq-jrHNPky903EcM&libraries=geometry&callback=onGoogleMapsReady"
  onerror="setStatus('Erro: Google Maps não carregou','error');"
></script>


<!-- ═══════════════════════════════════════════
     LÓGICA PRINCIPAL
     ═══════════════════════════════════════════ -->
<script>
/* ─────────────────────────────────────────────────
   Estado global
   ───────────────────────────────────────────────── */
var app = {
  userLat:       null,
  userLng:       null,
  compassHeading: 0,
  distance:      Infinity,
  isSimulating:  false,
  simIntervalId: null,
  gpsWatchId:    null,
  miniMap:       null,
  monMarker:     null
};

/* ─────────────────────────────────────────────────
   Mini-mapa — inicializado pelo callback do Maps
   ───────────────────────────────────────────────── */
function initMiniMap() {
  /* Estilo escuro para contrastar com a UI */
  var darkStyle = [
    { elementType: 'geometry',            stylers: [{ color: '#1a1a2e' }] },
    { elementType: 'labels.text.fill',    stylers: [{ color: '#8a8a9a' }] },
    { elementType: 'labels.text.stroke',  stylers: [{ color: '#1a1a2e' }] },
    { featureType: 'road',
      elementType: 'geometry',            stylers: [{ color: '#2c2c44' }] },
    { featureType: 'road.arterial',
      elementType: 'geometry',            stylers: [{ color: '#38385a' }] },
    { featureType: 'road.highway',
      elementType: 'geometry',            stylers: [{ color: '#484870' }] },
    { featureType: 'water',
      elementType: 'geometry',            stylers: [{ color: '#0d1b2a' }] },
    { featureType: 'poi.park',
      elementType: 'geometry',            stylers: [{ color: '#1a2e1a' }] },
    { featureType: 'poi',
      elementType: 'labels',              stylers: [{ visibility: 'off' }] },
    { featureType: 'transit',             stylers: [{ visibility: 'off' }] }
  ];

  app.miniMap = new google.maps.Map(
    document.getElementById('google-map-canvas'),
    {
      zoom: 18,
      center: { lat: MONUMENT_LAT, lng: MONUMENT_LNG },
      disableDefaultUI:  true,
      gestureHandling:   'none',
      clickableIcons:    false,
      mapTypeId:         'roadmap',
      styles:            darkStyle
    }
  );

  /* Marcador do monumento: círculo laranja (forma simétrica → não estraga na rotação CSS) */
  app.monMarker = new google.maps.Marker({
    position: { lat: MONUMENT_LAT, lng: MONUMENT_LNG },
    map:      app.miniMap,
    title:    'Praça Fausto Cardoso',
    icon: {
      path:         google.maps.SymbolPath.CIRCLE,
      scale:        10,
      fillColor:    '#FF6600',
      fillOpacity:  0.9,
      strokeColor:  '#fff',
      strokeWeight: 2.5
    }
  });
}

/* ─────────────────────────────────────────────────
   Atualiza o mini-mapa (pan + rotação heading-up)
   ───────────────────────────────────────────────── */
function updateMiniMap() {
  if (!app.miniMap || app.userLat === null) return;

  /* Centraliza o mapa na posição do usuário */
  app.miniMap.panTo({ lat: app.userLat, lng: app.userLng });

  /* Rotaciona o canvas para que a frente do usuário fique no topo:
     se o usuário olha para Leste (heading=90°), giramos o mapa -90°
     → Leste fica no topo (heading-up map).                          */
  document.getElementById('minimap-rotator').style.transform =
    'rotate(' + (-app.compassHeading) + 'deg)';
}

/* ─────────────────────────────────────────────────
   Cálculos de navegação com Google Maps Geometry
   ───────────────────────────────────────────────── */
function runCalculations() {
  if (!window._googleMapsReady || app.userLat === null) return;

  var userLL = new google.maps.LatLng(app.userLat, app.userLng);
  var monLL  = new google.maps.LatLng(MONUMENT_LAT, MONUMENT_LNG);

  /* Distância em metros */
  app.distance = google.maps.geometry.spherical.computeDistanceBetween(userLL, monLL);

  /* Bearing Google Maps: ângulo de userLL → monLL, [-180,180], 0=Norte */
  var bearing = google.maps.geometry.spherical.computeHeading(userLL, monLL);

  /* Rotação CSS da seta HUD:
     bearing − compassHeading = quanto a seta deve girar na tela          */
  var arrowRot = ((bearing - app.compassHeading) % 360 + 360) % 360;

  /* ── Atualiza seta ── */
  var ring = document.getElementById('arrow-ring');
  if (ring) ring.style.transform = 'rotate(' + arrowRot + 'deg)';

  /* ── Atualiza distância ── */
  var numEl  = document.getElementById('dist-number');
  var unitEl = document.getElementById('dist-unit');
  if (numEl) {
    if (app.distance < 1000) {
      numEl.textContent  = Math.round(app.distance) + 'm';
      if (unitEl) unitEl.textContent = 'do monumento';
    } else {
      numEl.textContent  = (app.distance / 1000).toFixed(1) + 'km';
      if (unitEl) unitEl.textContent = 'do monumento';
    }
    numEl.classList.toggle('near', app.distance < 20);
  }

  /* ── Atualiza status ── */
  var distStr = app.distance < 1000
    ? Math.round(app.distance) + 'm'
    : (app.distance / 1000).toFixed(1) + 'km';
  setStatus(
    app.distance < 20
      ? '📍 Você chegou! (' + Math.round(app.distance) + 'm)'
      : distStr + ' do monumento',
    'active'
  );

  /* ── Torna monumento AR visível ── */
  var mon = document.getElementById('monument-entity');
  if (mon) mon.setAttribute('visible', 'true');

  /* ── Atualiza mini-mapa ── */
  updateMiniMap();
}

/* ─────────────────────────────────────────────────
   Bússola — DeviceOrientationEvent
   Lida com iOS (webkitCompassHeading) e Android (alpha)
   ───────────────────────────────────────────────── */
function onDeviceOrientation(evt) {
  if (evt.webkitCompassHeading != null) {
    /* iOS Safari: heading clockwise from North, já em [0,360) */
    app.compassHeading = evt.webkitCompassHeading;
  } else if (evt.alpha != null) {
    /* Chrome/Android: alpha cresce anti-horário → inverte */
    app.compassHeading = (360 - evt.alpha + 360) % 360;
  }
  runCalculations();
}

/* ─────────────────────────────────────────────────
   GPS — watcher contínuo
   ───────────────────────────────────────────────── */
function onPositionUpdate(lat, lng) {
  app.userLat = lat;
  app.userLng = lng;
  if (window._googleMapsReady) runCalculations();
  else window._pendingCalc = runCalculations;
}

function startGPS() {
  if (!navigator.geolocation) { setStatus('GPS não suportado', 'error'); return; }
  var opts = { enableHighAccuracy: true, maximumAge: 0, timeout: 20000 };
  app.gpsWatchId = navigator.geolocation.watchPosition(
    function (pos) {
      if (!app.isSimulating) onPositionUpdate(pos.coords.latitude, pos.coords.longitude);
    },
    function (err) {
      var msgs = { 1: 'GPS: permissão negada', 2: 'GPS: posição indisponível', 3: 'GPS: timeout' };
      setStatus(msgs[err.code] || 'Erro de GPS', 'warn');
    },
    opts
  );
}

/* ─────────────────────────────────────────────────
   Simulação de posição (50 m do monumento)
   ───────────────────────────────────────────────── */
function toggleSimulate() {
  if (!app.isSimulating) startSimulation();
  else stopSimulation();
}
window.toggleSimulate = toggleSimulate;

function startSimulation() {
  app.isSimulating = true;
  /* Posição simulada: SIM_DISTANCE metros ao Norte do monumento */
  var dLat   = (SIM_DISTANCE / 6371000) * (180 / Math.PI);
  var simLat = MONUMENT_LAT + dLat;
  var simLng = MONUMENT_LNG;

  onPositionUpdate(simLat, simLng);
  /* Reenvia periodicamente para manter AR.js e mini-mapa sincronizados */
  app.simIntervalId = setInterval(function () { onPositionUpdate(simLat, simLng); }, 2000);

  var btn = document.getElementById('sim-btn');
  btn.textContent = '📡 GPS Real';
  btn.classList.add('simulating');
  document.getElementById('minimap-sim-badge').style.display = 'block';
}

function stopSimulation() {
  app.isSimulating = false;
  clearInterval(app.simIntervalId);
  var btn = document.getElementById('sim-btn');
  btn.textContent = '🎮 Simular 50m';
  btn.classList.remove('simulating');
  document.getElementById('minimap-sim-badge').style.display = 'none';
}

/* ─────────────────────────────────────────────────
   Utilidades de UI
   ───────────────────────────────────────────────── */
function setStatus(text, type) {
  var dot  = document.getElementById('status-dot');
  var span = document.getElementById('status-text');
  if (span) span.textContent = text;
  if (dot)  { dot.className = ''; if (type) dot.classList.add(type); }
}

function showGpsError(err) {
  var btn  = document.getElementById('start-btn');
  var hint = document.getElementById('ss-hint');
  var msgs = {
    1: '🔒 GPS negado. Toque em 🔒 na barra do navegador → Localização → Permitir. Recarregue a página.',
    2: '📡 Posição indisponível. Certifique-se de que o GPS do celular está ativo.',
    3: '⏱ Tempo esgotado ao obter GPS. Tente ao ar livre.'
  };
  if (hint) {
    hint.style.color      = '#ff6b6b';
    hint.style.fontWeight = '600';
    hint.textContent = msgs[err && err.code] || '❌ GPS indisponível. Verifique as permissões.';
  }
  if (btn) { btn.textContent = '↺ Tentar novamente'; btn.disabled = false; }
}

/* ─────────────────────────────────────────────────
   Botão INICIAR
   Sequência: DeviceOrientation → GPS → AR.js → HUD
   ───────────────────────────────────────────────── */
document.getElementById('start-btn').addEventListener('click', async function () {
  var btn  = document.getElementById('start-btn');
  var hint = document.getElementById('ss-hint');

  /* Restaura estado visual (caso seja segunda tentativa) */
  btn.textContent = '⏳ Aguardando…';
  btn.disabled    = true;
  if (hint) {
    hint.style.color      = '';
    hint.style.fontWeight = '';
    hint.textContent = 'Permita o acesso à câmera, localização e sensores de movimento.';
  }

  /* 1 ── iOS 13+: permissão explícita de DeviceOrientation */
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      var p = await DeviceOrientationEvent.requestPermission();
      if (p !== 'granted') alert('Permissão de orientação negada. A seta pode não funcionar.');
    } catch (e) { console.warn('[OrientPerm]', e); }
  }

  /* 2 ── GPS: solicitado dentro do gesto do usuário para garantir o diálogo nativo */
  try {
    await new Promise(function (resolve, reject) {
      navigator.geolocation.getCurrentPosition(resolve, reject, {
        enableHighAccuracy: true, timeout: 15000, maximumAge: 0
      });
    });
  } catch (err) {
    showGpsError(err);
    return;
  }

  /* 3 ── Ativa bússola */
  window.addEventListener('deviceorientation', onDeviceOrientation, true);

  /* 4 ── Ativa gps-camera do AR.js (agora que a permissão foi concedida) */
  var cam = document.getElementById('ar-camera');
  if (cam) cam.setAttribute('gps-camera', '');

  /* 5 ── Mostra HUD, esconde tela inicial */
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';

  /* 6 ── Inicia watcher de GPS */
  setStatus('Aguardando GPS…', 'warn');
  startGPS();
});
</script>
