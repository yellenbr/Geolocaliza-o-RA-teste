<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>HyperAR - Navegação AR</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDchAKfjN2mWlGsvrYZVoyt9xtKFPNtlTo&libraries=geometry"></script>

    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; }

        /* ── Botão de permissão da bússola (iOS) ── */
        #btn-permissao {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 3000;
            background: #4BD4D2;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            padding: 14px 28px;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(75,212,210,0.6);
        }

        /* ── Status GPS / Bússola (canto superior esquerdo) ── */
        #status-bar {
            position: absolute;
            top: 6px; left: 8px;
            z-index: 1001;
            display: flex; gap: 6px;
            pointer-events: none;
        }
        .status-pill {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            color: #aaa;
        }
        .status-pill.ok { color: #4BD4D2; }

        /* ── HUD Superior (estilo HyperAR) ── */
        #nav-overlay {
            position: absolute;
            top: 40px; left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: none;
            gap: 10px;
        }
        #arrow-circle {
            width: 72px; height: 72px;
            background: #4BD4D2;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(75,212,210,0.55);
        }
        #direction-svg {
            width: 38px; height: 38px;
            /* sem transition — suavização via JS */
        }
        #nav-pill {
            background: #fff;
            border-radius: 24px;
            padding: 8px 20px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.18);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #222;
            white-space: nowrap;
        }
        #nav-pill .sep { color: #ccc; }
        #nav-pill #time-text { color: #555; font-weight: 500; }

        /* ── Bottom Sheet (gaveta do mapa) ── */
        #bottom-sheet {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 40vh;
            background: #fff;
            border-radius: 40px 40px 0 0;
            z-index: 1000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -6px 28px rgba(0,0,0,0.20);
        }
        #map-canvas {
            flex: 1;
            width: 100%;
        }

        /* ── Bottom Navigation Bar ── */
        #bottom-nav {
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0 16px;
            border-top: 1px solid #f0f0f0;
            flex-shrink: 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 11px;
            font-weight: 600;
            color: #bbb;
            cursor: pointer;
            user-select: none;
        }
        .nav-item.active { color: #2979FF; }
        .nav-item svg { width: 24px; height: 24px; }
    </style>
</head>
<body>

    <!-- Botão de permissão iOS -->
    <button id="btn-permissao" onclick="pedirPermissaoIOS()">
        Toque para ativar a bussola
    </button>

    <!-- Indicadores de status -->
    <div id="status-bar">
        <span class="status-pill" id="st-gps">GPS...</span>
        <span class="status-pill" id="st-bus">Bussola...</span>
    </div>

    <!-- HUD Superior -->
    <div id="nav-overlay">
        <div id="arrow-circle">
            <svg id="direction-svg" viewBox="0 0 40 40" fill="none">
                <!-- Seta para cima (chevron + haste) -->
                <polygon points="20,3 33,20 24,20 24,37 16,37 16,20 7,20" fill="white"/>
            </svg>
        </div>
        <div id="nav-pill">
            <span id="dist-text">Aguardando GPS...</span>
            <span class="sep" id="pill-sep" style="display:none">·</span>
            <span id="time-text" style="display:none"></span>
        </div>
    </div>

    <!-- Bottom Sheet: Mapa + Barra de Navegação -->
    <div id="bottom-sheet">
        <div id="map-canvas"></div>
        <div id="bottom-nav">
            <!-- Mapa (ativo) -->
            <div class="nav-item active">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
                </svg>
                Mapa
            </div>
            <!-- QR Code -->
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M3 11h2v2H3zm0 4h2v2H3zm4-4h2v2H7zm0 4h2v2H7zm4-8h2v2h-2zm0 8h2v2h-2zm4-8h2v2h-2zm4 4h2v2h-2zm0-4h2v2h-2zm-4 4h2v2h-2zm4 4h2v2h-2zM3 3h8v8H3zm2 2v4h4V5zm8-2h8v8h-8zm2 2v4h4V5zM3 13h8v8H3zm2 2v4h4v-4z"/>
                </svg>
                QR Code
            </div>
            <!-- Libras -->
            <div class="nav-item">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M21 7c0-1.38-1.12-2.5-2.5-2.5-.23 0-.46.03-.67.08L14 3c0-1.1-.9-2-2-2s-2 .9-2 2v8.8L8.87 10.6c-.64-.64-1.56-.84-2.39-.55l-.01.01C5.53 10.4 5 11.27 5 12.2c0 .56.22 1.08.62 1.48L9.87 18c1.12 1.12 2.64 1.75 4.23 1.75H16c3.31 0 5-2.47 5-5V7z"/>
                </svg>
                Libras
            </div>
        </div>
    </div>

    <!-- Cena AR -->
    <a-scene vr-mode-ui="enabled: false" arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">

        <!-- Pin de Destino (esfera vermelha + haste + ponta cônica — animação flutuante) -->
        <a-entity id="dest-pin" gps-entity-place="latitude: -10.968111; longitude: -37.059889;">
            <a-sphere color="#E53935" radius="0.55" position="0 6.2 0"
                      material="emissive: #E53935; emissiveIntensity: 0.45;">
                <a-animation attribute="position"
                             from="0 6.2 0" to="0 6.95 0"
                             direction="alternate" dur="1500"
                             repeat="indefinite" easing="ease-in-out-sine">
                </a-animation>
            </a-sphere>
            <a-cylinder color="#E53935" radius="0.09" height="5" position="0 3.5 0"
                        material="emissive: #E53935; emissiveIntensity: 0.3;">
                <a-animation attribute="position"
                             from="0 3.5 0" to="0 3.88 0"
                             direction="alternate" dur="1500"
                             repeat="indefinite" easing="ease-in-out-sine">
                </a-animation>
            </a-cylinder>
            <a-cone color="#E53935" radius-bottom="0.55" radius-top="0" height="1"
                    position="0 0.5 0" rotation="0 0 180"
                    material="emissive: #E53935; emissiveIntensity: 0.3;">
                <a-animation attribute="position"
                             from="0 0.5 0" to="0 0.88 0"
                             direction="alternate" dur="1500"
                             repeat="indefinite" easing="ease-in-out-sine">
                </a-animation>
            </a-cone>
        </a-entity>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
    const DEST = { lat: -10.968111, lng: -37.059889 };

    // ────────────────────────────────────────────────
    // Estado
    // ────────────────────────────────────────────────
    let currentPos    = null;
    let heading       = 0;   // heading suavizado (graus, 0=Norte)
    let headingRaw    = 0;
    let compassAtivo  = false;
    let gpsAtivo      = false;

    let map, directionsService, directionsRenderer, userMarker;
    let lastRoutePos  = null;
    let routeTimer    = null;

    // ────────────────────────────────────────────────
    // Filtro de suavização angular (evita saltos 359→1)
    // ────────────────────────────────────────────────
    function suavizarAngulo(atual, novo, fator) {
        let d = ((novo - atual + 540) % 360) - 180; // diferença no intervalo [-180, 180]
        return (atual + d * fator + 360) % 360;
    }

    // ────────────────────────────────────────────────
    // BÚSSOLA
    // ────────────────────────────────────────────────
    function iniciarBussola() {
        // deviceorientationabsolute (Android Chrome 67+) — mais confiável
        window.addEventListener('deviceorientationabsolute', onOrientacao, true);
        // deviceorientation — iOS Safari (usa webkitCompassHeading)
        window.addEventListener('deviceorientation', onOrientacao, true);
    }

    function pedirPermissaoIOS() {
        DeviceOrientationEvent.requestPermission()
            .then(perm => {
                if (perm === 'granted') {
                    iniciarBussola();
                    document.getElementById('btn-permissao').style.display = 'none';
                }
            })
            .catch(console.error);
    }

    function onOrientacao(e) {
        let h = null;

        if (e.webkitCompassHeading != null) {
            // iOS Safari — webkitCompassHeading já é 0=Norte, aumenta no sentido horário
            h = e.webkitCompassHeading;
        } else if (e.alpha != null && e.absolute) {
            // Android com sensor absoluto — alpha cresce no sentido anti-horário
            h = (360 - e.alpha + 360) % 360;
        } else if (e.alpha != null) {
            // Android sem garantia de absoluto — tenta mesmo assim
            h = (360 - e.alpha + 360) % 360;
        }

        if (h !== null) {
            heading = suavizarAngulo(heading, h, 0.2);
            compassAtivo = true;
            document.getElementById('st-bus').textContent = 'Bussola OK';
            document.getElementById('st-bus').className = 'status-pill ok';
            atualizarSeta();
        }
    }

    // ────────────────────────────────────────────────
    // CÁLCULOS GPS
    // ────────────────────────────────────────────────
    function calcBearing(de, para) {
        const D2R = Math.PI / 180;
        const dLon = (para.lng - de.lng) * D2R;
        const lat1 = de.lat * D2R, lat2 = para.lat * D2R;
        const y = Math.sin(dLon) * Math.cos(lat2);
        const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
        return (Math.atan2(y, x) * (180 / Math.PI) + 360) % 360;
    }

    function calcDistancia(de, para) {
        const R = 6371000, D2R = Math.PI / 180;
        const dLat = (para.lat - de.lat) * D2R;
        const dLon = (para.lng - de.lng) * D2R;
        const a = Math.sin(dLat/2)**2
                + Math.cos(de.lat*D2R) * Math.cos(para.lat*D2R) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // ────────────────────────────────────────────────
    // HUD SETA 2D — aponta apenas a direção relativa
    // ────────────────────────────────────────────────
    function atualizarSeta() {
        if (!currentPos) return;

        const bearing     = calcBearing(currentPos, DEST);
        const angRelativo = (bearing - heading + 360) % 360;

        document.getElementById('direction-svg').style.transform =
            `rotate(${angRelativo}deg)`;
    }

    // ────────────────────────────────────────────────
    // GPS — watchPosition
    // ────────────────────────────────────────────────
    function onPosicaoAtualizada(position) {
        currentPos = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
        };
        gpsAtivo = true;
        document.getElementById('st-gps').textContent = 'GPS OK';
        document.getElementById('st-gps').className = 'status-pill ok';

        // Quando em movimento, coords.heading é mais preciso que a bússola
        // (igual ao Google Maps que usa GPS heading ao andar)
        const speed   = position.coords.speed;   // m/s (null em alguns browsers)
        const gpsHead = position.coords.heading; // graus, 0=Norte
        if (gpsHead != null && !isNaN(gpsHead) && speed != null && speed > 0.4) {
            heading = suavizarAngulo(heading, gpsHead, 0.4);
        }

        // Marcador do usuário no mapa
        if (!userMarker) {
            userMarker = new google.maps.Marker({
                position: currentPos, map,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 9,
                    fillColor: '#4BD4D2', fillOpacity: 1,
                    strokeColor: '#ffffff', strokeWeight: 2
                },
                title: 'Você'
            });
        } else {
            userMarker.setPosition(currentPos);
        }

        map.setCenter(currentPos);
        atualizarSeta();

        // Recalcula rota só ao mover >10 m (evita flood na API)
        const moveu = !lastRoutePos || calcDistancia(currentPos, lastRoutePos) > 10;
        if (moveu) {
            clearTimeout(routeTimer);
            routeTimer = setTimeout(() => {
                lastRoutePos = { ...currentPos };
                calcularRota(currentPos, DEST);
            }, 1200);
        }
    }

    // ────────────────────────────────────────────────
    // TRILHA AR — breadcrumbs no chão (chevrons + plano neon)
    // ────────────────────────────────────────────────
    const CHEVRON_SVG = 'data:image/svg+xml,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80">' +
        '<polygon points="50,4 96,76 50,50 4,76" fill="white" opacity="0.95"/>' +
        '</svg>'
    );

    function gerarCaminhoAR(overviewPath) {
        // Remove trilha anterior
        document.querySelectorAll('.breadcrumb-ar').forEach(el => el.remove());

        const scene = document.querySelector('a-scene');
        const PASSO = 4; // amostra a cada 4 pontos da polyline

        for (let i = 0; i < overviewPath.length - 1; i += PASSO) {
            const pt   = overviewPath[i];
            const prox = overviewPath[Math.min(i + PASSO, overviewPath.length - 1)];

            const lat = pt.lat();
            const lng = pt.lng();
            const bearing = calcBearing(
                { lat, lng },
                { lat: prox.lat(), lng: prox.lng() }
            );

            // Plano azul translúcido (trilha neon no asfalto)
            const trail = document.createElement('a-plane');
            trail.classList.add('breadcrumb-ar');
            trail.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng}`);
            trail.setAttribute('width', '1');
            trail.setAttribute('height', '0.75');
            trail.setAttribute('position', '0 -1.52 0');
            trail.setAttribute('rotation', '-90 0 0');
            trail.setAttribute('material', 'color: #2979FF; transparent: true; opacity: 0.38; side: double');
            scene.appendChild(trail);

            // Seta (chevron) branca deitada no chão apontando para o próximo ponto
            const arrow = document.createElement('a-image');
            arrow.classList.add('breadcrumb-ar');
            arrow.setAttribute('gps-entity-place', `latitude: ${lat}; longitude: ${lng}`);
            arrow.setAttribute('src', CHEVRON_SVG);
            arrow.setAttribute('width', '1.1');
            arrow.setAttribute('height', '0.85');
            arrow.setAttribute('position', '0 -1.48 0');
            arrow.setAttribute('rotation', `-90 ${bearing} 0`);
            arrow.setAttribute('material', 'transparent: true; opacity: 0.92; side: double');
            scene.appendChild(arrow);
        }
    }

    // ────────────────────────────────────────────────
    // MAPA E ROTA
    // ────────────────────────────────────────────────
    function initNavigation() {
        map = new google.maps.Map(document.getElementById('map-canvas'), {
            zoom: 18, center: DEST, disableDefaultUI: true,
            styles: [{ featureType: 'all', elementType: 'labels',
                       stylers: [{ visibility: 'on' }] }]
        });
        directionsService  = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map,
            suppressMarkers: true,   // oculta A e B — o ponto ciano já indica você
            polylineOptions: { strokeColor: '#4BD4D2', strokeWeight: 5 }
        });

        // Marcador fixo do destino (B)
        new google.maps.Marker({
            position: DEST,
            map,
            title: 'Destino'
        });

        // GPS
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                onPosicaoAtualizada,
                err => console.warn('GPS erro:', err),
                { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
            );
        }

        // Bússola — iOS requer gesto do usuário; Android inicia direto
        const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
        if (isIOS && typeof DeviceOrientationEvent.requestPermission === 'function') {
            document.getElementById('btn-permissao').style.display = 'block';
        } else {
            iniciarBussola();
        }
    }

    function calcularRota(inicio, fim) {
        directionsService.route({
            origin: inicio, destination: fim,
            travelMode: google.maps.TravelMode.WALKING
        }, (response, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(response);
                const leg = response.routes[0].legs[0];

                // Atualiza pílula do HUD com distância e tempo
                document.getElementById('dist-text').textContent = leg.distance.text;
                document.getElementById('time-text').textContent = `~${leg.duration.text} a pé`;
                document.getElementById('pill-sep').style.display = 'inline';
                document.getElementById('time-text').style.display  = 'inline';

                // Gera trilha 3D de chevrons no chão
                gerarCaminhoAR(response.routes[0].overview_path);
            }
        });
    }

    window.onload = initNavigation;
    </script>
</body>
</html>
