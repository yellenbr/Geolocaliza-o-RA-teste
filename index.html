<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Protótipo WebAR - Estilo Hyper</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script type="text/javascript" src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar-threex-location-only.js"></script>
    <script type="text/javascript" src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Camada de UI sobreposta à câmera */
        #ui-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 35vh; /* Ocupa os 35% inferiores da tela */
            display: flex;
            justify-content: center;
            align-items: flex-end;
            z-index: 999; /* Garante que fique por cima do canvas 3D */
            pointer-events: none; /* Deixa o toque passar para o mapa se necessário */
        }

        /* O "Card" do Mapa estilo HyperAR */
        .map-card {
            width: 90%;
            height: 85%;
            margin-bottom: 20px;
            background: rgba(20, 20, 20, 0.85); /* Fundo escuro translúcido */
            backdrop-filter: blur(10px); /* Efeito Glassmorphism */
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: auto; /* Reativa o toque para arrastar o mapa */
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-header {
            color: white;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
        }

        /* Container do iframe do mapa */
        .map-container {
            width: 100%;
            flex-grow: 1;
            border-radius: 16px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div class="map-card">
            <div class="card-header">Destino: Ponto Histórico</div>
            <div class="map-container">
                <iframe src="https://maps.google.com/maps?q=-10.968111,-37.059889&z=17&output=embed" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;">
        
        <a-box 
            color="#00E5FF" 
            scale="5 5 5" 
            position="0 2 0"
            gps-entity-place="latitude: -10.968111; longitude: -37.059889;"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        </a-box>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>
</body>
</html>
